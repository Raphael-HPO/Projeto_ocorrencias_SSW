name: CI/CD no Meu Computador

on:
  push:
    branches: [ main ]

jobs:
  deploy-local:
    runs-on: self-hosted

    # AQUI ESTÁ O TRUQUE: Diz ao GitHub para entrar na pasta da sua API antes de rodar os comandos
    defaults:
      run:
        working-directory: ./Projeto_ocorrencias_API # <--- Coloque o nome da sua pasta exatamente como está no Git

    steps:
      - name: Baixar código do GitHub
        uses: actions/checkout@v4

      - name: Criar arquivo .env
        shell: powershell
        run: |
          $content = @(
            "PORT=${{ secrets.PORTA }}",
            "DB_URL=${{ secrets.DB_URL }}",
            "DB_USER=${{ secrets.DB_USER }}",
            "DB_PASSWORD=${{ secrets.DB_PASS }}"
          )
          [System.IO.File]::WriteAllLines("$(Get-Location)/.env", $content)

      - name: Executar Testes JUnit
        run: ./mvnw test

      - name: Build e Deploy no Docker
        run: docker-compose up -d --build
