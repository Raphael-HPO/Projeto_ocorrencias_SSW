name: CI/CD no Meu Computador

on:
  push:
    branches: [ main ]

jobs:
  deploy-local:
    runs-on: self-hosted

    # AQUI ESTÁ O TRUQUE: Diz ao GitHub para entrar na pasta da sua API antes de rodar os comandos
    defaults:
      run:
        working-directory: ./Projeto_ocorrencias_API # <--- Coloque o nome da sua pasta exatamente como está no Git

    steps:
      - name: Baixar código do GitHub
        uses: actions/checkout@v4

      - name: Criar arquivo .env
        shell: pwsh # Usa o PowerShell
        run: |
          "PORT=${{ secrets.PORT }}" | Out-File -FilePath .env
          "DB_URL=${{ secrets.DB_URL }}" | Out-File -FilePath .env -Append
          "DB_USER=${{ secrets.DB_USER }}" | Out-File -FilePath .env -Append
          "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" | Out-File -FilePath .env -Append

      - name: Executar Testes JUnit
        run: ./mvnw test

      - name: Build e Deploy no Docker
        run: docker-compose up -d --build
